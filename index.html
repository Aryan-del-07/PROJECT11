<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stued</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e9;
        --surface: #fffaf3;
        --text: #2f2a24;
        --muted: #6a6258;
        --border: #d9d0c2;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      a {
        color: inherit;
      }

      input,
      textarea,
      select,
      button {
        color: var(--text);
        background: var(--surface);
        border-color: var(--border);
      }

      ::placeholder {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
